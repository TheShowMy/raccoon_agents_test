<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>macOS 模拟桌面</title>
  <style>
    /* ===== Reset & Base ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --menu-bar-height: 28px;
      --dock-height: 80px;
      --menu-bar-bg: rgba(30, 30, 30, 0.82);
      --menu-bar-text: #f5f5f7;
      --menu-bar-text-dim: #b0b0b5;
      --desktop-gradient-start: #2b5876;
      --desktop-gradient-mid1: #4e4376;
      --desktop-gradient-mid2: #ad5389;
      --desktop-gradient-end: #3a1c71;
      --font-system: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, 'Helvetica Neue', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font-system);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===== Full-Screen Container ===== */
    .macos-desktop {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ===== Desktop Wallpaper ===== */
    .desktop-wallpaper {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        var(--desktop-gradient-start) 0%,
        var(--desktop-gradient-mid1) 30%,
        var(--desktop-gradient-mid2) 65%,
        var(--desktop-gradient-end) 100%
      );
      z-index: 0;
    }

    /* subtle noise overlay for texture */
    .desktop-wallpaper::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
    }

    /* ===== Top Menu Bar ===== */
    .menu-bar {
      position: relative;
      z-index: 100;
      height: var(--menu-bar-height);
      background: var(--menu-bar-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      flex-shrink: 0;
      color: var(--menu-bar-text);
      font-size: 13px;
      line-height: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* ---- Left Section (Apple + App Menus) ---- */
    .menu-bar__left {
      display: flex;
      align-items: center;
      gap: 0;
      height: 100%;
    }

    .menu-bar__apple {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      height: 100%;
      font-size: 13px;
      color: var(--menu-bar-text);
      cursor: default;
      opacity: 0.9;
    }

    .menu-bar__apple:hover {
      opacity: 1;
    }

    .menu-bar__menu {
      display: flex;
      align-items: center;
      padding: 0 10px;
      height: 100%;
      color: var(--menu-bar-text);
      cursor: default;
      font-weight: 500;
      opacity: 0.85;
      border-radius: 5px;
      transition: background 0.15s ease, opacity 0.15s ease;
    }

    .menu-bar__menu:hover {
      background: rgba(255, 255, 255, 0.12);
      opacity: 1;
    }

    .menu-bar__menu--bold {
      font-weight: 600;
    }

    /* ---- Right Section (Status Icons + Time) ---- */
    .menu-bar__right {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 100%;
    }

    .menu-bar__status-icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Wi-Fi icon (SVG-based) */
    .menu-bar__icon-wifi {
      display: flex;
      align-items: center;
    }

    .menu-bar__icon-wifi svg {
      width: 16px;
      height: 16px;
    }

    /* Battery icon */
    .menu-bar__icon-battery {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .menu-bar__icon-battery svg {
      width: 22px;
      height: 12px;
    }

    .menu-bar__battery-percent {
      font-size: 11px;
      color: var(--menu-bar-text);
    }

    .menu-bar__time {
      font-size: 13px;
      font-weight: 500;
      color: var(--menu-bar-text);
      white-space: nowrap;
      min-width: 60px;
      text-align: right;
    }

    /* ===== Desktop Main Area ===== */
    .desktop-main {
      position: relative;
      z-index: 1;
      flex: 1;
      /* The wallpaper is behind, this is the interactive layer */
    }

    /* ===== Bottom Dock Area (Placeholder) ===== */
    .dock-area {
      position: relative;
      z-index: 100;
      height: var(--dock-height);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
    }

    .dock {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
    }

    .dock__item {
      position: relative;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transform-origin: bottom center;
      flex-shrink: 0;
    }

    .dock__item:hover {
      transform: scale(1.55);
    }

    .dock__item:active {
      transform: scale(1.25);
    }

    .dock__item-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .dock__item-tooltip {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 30, 30, 0.92);
      color: #fff;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .dock__item:hover .dock__item-tooltip {
      opacity: 1;
    }

    /* ===== Window System ===== */
    .window {
      position: absolute;
      background: rgba(30, 30, 30, 0.92);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 280px;
      min-height: 180px;
      animation: window-open 0.2s ease-out;
    }

    @keyframes window-open {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .window--focused {
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    /* Minimized: shrink to titlebar only */
    .window--minimized {
      height: auto !important;
      min-height: 0 !important;
    }

    .window--minimized .window__content,
    .window--minimized .window__resize-handle {
      display: none;
    }

    /* Maximized: fill desktop-main */
    .window--maximized {
      left: 0 !important;
      top: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border-radius: 0 !important;
    }

    .window--maximized .window__resize-handle {
      display: none;
    }

    /* ===== Title Bar ===== */
    .window__titlebar {
      display: flex;
      align-items: center;
      height: 40px;
      padding: 0 12px;
      background: rgba(45, 45, 45, 0.5);
      cursor: default;
      flex-shrink: 0;
    }

    /* Traffic Lights Container */
    .window__traffic-lights {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .window__tl {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: filter 0.15s ease;
      line-height: 0;
    }

    .window__tl:hover {
      filter: brightness(0.8);
    }

    .window__tl:active {
      filter: brightness(0.65);
    }

    .window__tl--close    { background: #ff5f57; }
    .window__tl--minimize { background: #febc2e; }
    .window__tl--maximize { background: #28c840; }

    .window__tl svg {
      opacity: 0;
      transition: opacity 0.12s ease;
    }

    .window__titlebar:hover .window__tl svg,
    .window__tl:hover svg {
      opacity: 1;
    }

    .window__title {
      flex: 1;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    /* ===== Window Content ===== */
    .window__content {
      flex: 1;
      overflow: auto;
      color: #e0e0e0;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.15);
    }

    /* ===== Resize Handle ===== */
    .window__resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 18px;
      height: 18px;
      cursor: nwse-resize;
      z-index: 10;
      background:
        linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.12) 60%),
        linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.08) 60%);
      background-size: 6px 6px, 10px 10px;
      background-position: bottom right;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body>
  <div class="macos-desktop">

    <!-- Desktop Wallpaper -->
    <div class="desktop-wallpaper"></div>

    <!-- Top Menu Bar -->
    <header class="menu-bar">
      <!-- Left: Apple logo + app menu placeholders -->
      <div class="menu-bar__left">
        <span class="menu-bar__apple" title="Apple"></span>
        <span class="menu-bar__menu menu-bar__menu--bold">访达</span>
        <span class="menu-bar__menu">文件</span>
        <span class="menu-bar__menu">编辑</span>
        <span class="menu-bar__menu">显示</span>
        <span class="menu-bar__menu">前往</span>
        <span class="menu-bar__menu">窗口</span>
        <span class="menu-bar__menu">帮助</span>
      </div>

      <!-- Right: Status icons + time -->
      <div class="menu-bar__right">
        <span class="menu-bar__icon-wifi" title="Wi-Fi">
          <svg viewBox="0 0 16 16" fill="currentColor" opacity="0.9">
            <path d="M8 3C5.5 3 3.3 4.1 1.7 5.8L3.1 7.2C4.3 5.9 6.1 5 8 5s3.7.9 4.9 2.2l1.4-1.4C12.7 4.1 10.5 3 8 3z"/>
            <path d="M8 7C6.4 7 5 7.8 4 8.9l1.4 1.4C6 9.7 6.9 9.2 8 9.2s2 .5 2.6 1.1L12 8.9C11 7.8 9.6 7 8 7z"/>
            <circle cx="8" cy="12" r="1.5"/>
          </svg>
        </span>
        <span class="menu-bar__icon-battery" title="电池">
          <svg viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.9">
            <rect x="0.6" y="0.6" width="19" height="10.8" rx="2" stroke="currentColor" fill="none"/>
            <rect x="2" y="2" width="14" height="8" rx="1" fill="currentColor" opacity="0.8"/>
            <rect x="19.6" y="3.6" width="2.5" height="4.8" rx="1" fill="currentColor" opacity="0.6" stroke="none"/>
          </svg>
          <span class="menu-bar__battery-percent">85%</span>
        </span>
        <span class="menu-bar__time" id="menuBarTime">00:00</span>
      </div>
    </header>

    <!-- Desktop Main Area -->
    <main class="desktop-main"></main>

    <!-- Bottom Dock -->
    <footer class="dock-area">
      <nav class="dock">
        <!-- 终端 -->
        <div class="dock__item" data-app="terminal" title="终端">
          <span class="dock__item-icon">
            <svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="3" width="44" height="44" rx="11" fill="#2a2a2a"/>
              <text x="25" y="33" text-anchor="middle" fill="#0f0" font-size="22" font-family="monospace" font-weight="bold">&gt;_</text>
            </svg>
          </span>
          <span class="dock__item-tooltip">终端</span>
        </div>

        <!-- 访达 -->
        <div class="dock__item" data-app="finder" title="访达">
          <span class="dock__item-icon">
            <svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="3" width="44" height="44" rx="11" fill="#4a9eff"/>
              <path d="M13,17 C13,15.5 14,14.5 15.4,14.5 L22,14.5 L24.5,17 L33,17 C34.4,17 35.4,18 35.4,19.5 L35.4,33 C35.4,34.5 34.4,35.5 33,35.5 L15.4,35.5 C14,35.5 13,34.5 13,33 Z" fill="rgba(255,255,255,0.15)"/>
            </svg>
          </span>
          <span class="dock__item-tooltip">访达</span>
        </div>

        <!-- 文本编辑器 -->
        <div class="dock__item" data-app="text-editor" title="文本编辑器">
          <span class="dock__item-icon">
            <svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
              <rect x="8" y="5" width="34" height="40" rx="8" fill="#0077ed"/>
              <rect x="14" y="18" width="16" height="2" rx="1" fill="rgba(255,255,255,0.25)"/>
              <rect x="14" y="23" width="22" height="2" rx="1" fill="rgba(255,255,255,0.25)"/>
              <rect x="14" y="28" width="12" height="2" rx="1" fill="rgba(255,255,255,0.25)"/>
              <rect x="14" y="33" width="18" height="2" rx="1" fill="rgba(255,255,255,0.25)"/>
            </svg>
          </span>
          <span class="dock__item-tooltip">文本编辑器</span>
        </div>

        <!-- 计算器 -->
        <div class="dock__item" data-app="calculator" title="计算器">
          <span class="dock__item-icon">
            <svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="3" width="44" height="44" rx="11" fill="#2d2d2d"/>
              <rect x="11" y="11" width="12" height="12" rx="3" fill="#ff9500"/>
              <rect x="27" y="11" width="12" height="12" rx="3" fill="#555"/>
              <rect x="11" y="27" width="12" height="12" rx="3" fill="#555"/>
              <rect x="27" y="27" width="12" height="12" rx="3" fill="#555"/>

        <!-- 飞机大战 -->
        <div class="dock__item" data-app="airplane" title="飞机大战">
          <span class="dock__item-icon">
            <svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="3" width="44" height="44" rx="11" fill="#16213e"/>
              <polygon points="25,11 31,36 25,30 19,36" fill="#e94560"/>
              <circle cx="25" cy="25" r="3" fill="#ff6b6b"/>
            </svg>
          </span>
          <span class="dock__item-tooltip">飞机大战</span>
        </div>
      </nav>
    </footer>

  </div>

  <script>
    // Real-time clock update
    (function updateTime() {
      const timeEl = document.getElementById('menuBarTime');
      if (!timeEl) return;

      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      timeEl.textContent = hours + ':' + minutes;

      // Schedule next update at the beginning of the next minute
      const msUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
      setTimeout(updateTime, msUntilNextMinute + 50);
    })();

    // ===== Window System =====
    (function() {
      var desktopMain = document.querySelector('.desktop-main');
      if (!desktopMain) return;

      var zIndexCounter = 100;
      var windows = [];

      /**
       * Bring the given window to the front (highest z-index).
       */
      function bringToFront(win) {
        zIndexCounter++;
        win.style.zIndex = zIndexCounter;
        windows.forEach(function(w) { w.classList.remove('window--focused'); });
        win.classList.add('window--focused');
      }

      function savePosition(win) {
        win._prevLeft = win.style.left;
        win._prevTop = win.style.top;
        win._prevWidth = win.style.width;
        win._prevHeight = win.style.height;
      }

      function restoreMaximize(win) {
        win.classList.remove('window--maximized');
        win.style.left = win._prevLeft || '100px';
        win.style.top = win._prevTop || '80px';
        win.style.width = win._prevWidth || '620px';
        win.style.height = win._prevHeight || '420px';
      }

      /**
       * Factory: createWindow(title, content)
       *  - title: string for the window title bar
       *  - content: string (HTML) or HTMLElement to place in the window body
       * Returns the window DOM element.
       */
      function createWindow(title, content) {
        // ---- Build elements ----
        var win = document.createElement('div');
        win.className = 'window';

        // Position: cascade offset for each new window
        var offset = (windows.length % 10) * 28;
        win.style.left = (100 + offset) + 'px';
        win.style.top = (80 + offset) + 'px';
        win.style.width = '620px';
        win.style.height = '420px';

        // Title bar
        var titlebar = document.createElement('div');
        titlebar.className = 'window__titlebar';

        // Traffic lights
        var lights = document.createElement('div');
        lights.className = 'window__traffic-lights';

        // Close button
        var closeBtn = document.createElement('button');
        closeBtn.className = 'window__tl window__tl--close';
        closeBtn.title = '关闭';
        closeBtn.innerHTML = '<svg width="7" height="7" viewBox="0 0 7 7"><line x1="0.5" y1="0.5" x2="6.5" y2="6.5" stroke="#4a0000" stroke-width="1.2"/><line x1="6.5" y1="0.5" x2="0.5" y2="6.5" stroke="#4a0000" stroke-width="1.2"/></svg>';
        closeBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          win.remove();
          windows = windows.filter(function(w) { return w !== win; });
        });

        // Minimize button
        var minBtn = document.createElement('button');
        minBtn.className = 'window__tl window__tl--minimize';
        minBtn.title = '最小化';
        minBtn.innerHTML = '<svg width="7" height="7" viewBox="0 0 7 7"><line x1="1" y1="3.5" x2="6" y2="3.5" stroke="#7a5500" stroke-width="1.2"/></svg>';
        minBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (win.classList.contains('window--minimized')) {
            win.classList.remove('window--minimized');
          } else {
            if (win.classList.contains('window--maximized')) {
              restoreMaximize(win);
            }
            win.classList.add('window--minimized');
          }
          bringToFront(win);
        });

        // Maximize button
        var maxBtn = document.createElement('button');
        maxBtn.className = 'window__tl window__tl--maximize';
        maxBtn.title = '最大化';
        maxBtn.innerHTML = '<svg width="7" height="7" viewBox="0 0 7 7"><polygon points="1,1 6,1 6,2.5 6,6 1,6 1,2.5" fill="none" stroke="#004d00" stroke-width="1"/></svg>';
        maxBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (win.classList.contains('window--minimized')) {
            win.classList.remove('window--minimized');
          }
          if (win.classList.contains('window--maximized')) {
            restoreMaximize(win);
          } else {
            savePosition(win);
            win.classList.add('window--maximized');
          }
          bringToFront(win);
        });

        lights.appendChild(closeBtn);
        lights.appendChild(minBtn);
        lights.appendChild(maxBtn);

        // Title text
        var titleSpan = document.createElement('span');
        titleSpan.className = 'window__title';
        titleSpan.textContent = title;

        titlebar.appendChild(lights);
        titlebar.appendChild(titleSpan);

        // Content area
        var contentDiv = document.createElement('div');
        contentDiv.className = 'window__content';
        if (typeof content === 'string') {
          contentDiv.innerHTML = content;
        } else if (content instanceof HTMLElement) {
          contentDiv.appendChild(content);
        }

        // Resize handle
        var resizeHandle = document.createElement('div');
        resizeHandle.className = 'window__resize-handle';

        // Assemble window
        win.appendChild(titlebar);
        win.appendChild(contentDiv);
        win.appendChild(resizeHandle);

        // ---- Events ----

        // Focus on any mousedown within the window
        win.addEventListener('mousedown', function() {
          bringToFront(win);
        });

        // ---- Drag (titlebar) ----
        var isDragging = false;
        var dragStartX, dragStartY, winStartLeft, winStartTop;

        function onDragMouseMove(e) {
          if (!isDragging) return;
          var dx = e.clientX - dragStartX;
          var dy = e.clientY - dragStartY;
          var newLeft = winStartLeft + dx;
          var newTop = winStartTop + dy;

          var parentRect = desktopMain.getBoundingClientRect();
          newLeft = Math.max(-200, Math.min(newLeft, parentRect.width - 120));
          newTop = Math.max(0, Math.min(newTop, parentRect.height - 24));

          win.style.left = newLeft + 'px';
          win.style.top = newTop + 'px';
        }

        function onDragMouseUp() {
          if (!isDragging) return;
          isDragging = false;
          document.removeEventListener('mousemove', onDragMouseMove);
          document.removeEventListener('mouseup', onDragMouseUp);
        }

        titlebar.addEventListener('mousedown', function(e) {
          if (e.target.closest('.window__tl')) return;
          if (win.classList.contains('window--minimized')) return;
          if (win.classList.contains('window--maximized')) return;

          isDragging = true;
          dragStartX = e.clientX;
          dragStartY = e.clientY;
          winStartLeft = win.offsetLeft;
          winStartTop = win.offsetTop;

          document.addEventListener('mousemove', onDragMouseMove);
          document.addEventListener('mouseup', onDragMouseUp);
          e.preventDefault();
        });

        // ---- Resize (bottom-right handle) ----
        var isResizing = false;
        var resizeStartX, resizeStartY, winStartWidth, winStartHeight;

        function onResizeMouseMove(e) {
          if (!isResizing) return;
          var dx = e.clientX - resizeStartX;
          var dy = e.clientY - resizeStartY;
          win.style.width = Math.max(280, winStartWidth + dx) + 'px';
          win.style.height = Math.max(180, winStartHeight + dy) + 'px';
        }

        function onResizeMouseUp() {
          if (!isResizing) return;
          isResizing = false;
          document.removeEventListener('mousemove', onResizeMouseMove);
          document.removeEventListener('mouseup', onResizeMouseUp);
        }

        resizeHandle.addEventListener('mousedown', function(e) {
          if (win.classList.contains('window--minimized')) return;
          if (win.classList.contains('window--maximized')) return;

          isResizing = true;
          resizeStartX = e.clientX;
          resizeStartY = e.clientY;
          winStartWidth = win.offsetWidth;
          winStartHeight = win.offsetHeight;

          document.addEventListener('mousemove', onResizeMouseMove);
          document.addEventListener('mouseup', onResizeMouseUp);
          e.preventDefault();
          e.stopPropagation();
        });

        // ---- Attach to DOM ----
        desktopMain.appendChild(win);
        windows.push(win);
        bringToFront(win);

        return win;
      }

      // Expose globally for console testing
      window.createWindow = createWindow;
    })();

    // ===== Dock Click Handlers =====
    (function() {
      var dockItems = document.querySelectorAll('.dock__item');
      if (!dockItems.length) return;

      // ===== Terminal Application =====
      function createTerminalContent() {
        var container = document.createElement('div');
        container.style.cssText = 'display:flex;flex-direction:column;height:100%;';

        // Output area
        var output = document.createElement('div');
        output.className = 'terminal-output';
        output.style.cssText = 'flex:1;overflow-y:auto;padding:12px;font-family:"SF Mono",Monaco,"Cascadia Code",Consolas,monospace;font-size:13px;color:#0f0;white-space:pre-wrap;word-break:break-all;background:rgba(0,0,0,0.3);';

        // Helper to append a line of text to the output area
        function appendLine(text, opt_color) {
          var line = document.createElement('div');
          line.textContent = text;
          if (opt_color) line.style.color = opt_color;
          output.appendChild(line);
          output.scrollTop = output.scrollHeight;
        }

        // Input line
        var inputLine = document.createElement('div');
        inputLine.style.cssText = 'display:flex;align-items:center;padding:4px 12px;border-top:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.4);';

        var promptSpan = document.createElement('span');
        promptSpan.textContent = '> ';
        promptSpan.style.cssText = 'color:#0f0;font-family:"SF Mono",Monaco,"Cascadia Code",Consolas,monospace;font-size:13px;flex-shrink:0;';

        var input = document.createElement('input');
        input.type = 'text';
        input.spellcheck = false;
        input.style.cssText = 'flex:1;background:transparent;border:none;outline:none;color:#0f0;font-family:"SF Mono",Monaco,"Cascadia Code",Consolas,monospace;font-size:13px;caret-color:#0f0;';

        inputLine.appendChild(promptSpan);
        inputLine.appendChild(input);

        container.appendChild(output);
        container.appendChild(inputLine);

        // Command history for up/down arrow navigation
        var history = [];
        var historyIndex = -1;

        // Welcome banner
        appendLine('macOS Terminal (simulated) — v1.0');
        appendLine('Type \'help\' to see available commands.');
        appendLine('');

        // Core command processor
        function processCommand(cmd) {
          var trimmed = cmd.trim();
          if (!trimmed) {
            appendLine('');
            return;
          }

          history.push(trimmed);
          historyIndex = history.length;

          // Echo the entered command
          appendLine('> ' + trimmed, '#aaa');

          var parts = trimmed.split(/\s+/);
          var command = parts[0].toLowerCase();
          var args = parts.slice(1);

          switch (command) {
            case 'help':
              appendLine('Available commands:');
              appendLine('  help          - Show this help message');
              appendLine('  clear         - Clear the terminal screen');
              appendLine('  echo <text>   - Print the given text');
              appendLine('  date          - Show current date and time');
              appendLine('  whoami        - Show current user name');
              break;
            case 'clear':
              while (output.firstChild) {
                output.removeChild(output.firstChild);
              }
              break;
            case 'echo':
              appendLine(args.join(' '));
              break;
            case 'date':
              appendLine(new Date().toString());
              break;
            case 'whoami':
              appendLine('user');
              break;
            default:
              appendLine('command not found: ' + command);
              appendLine('Type \'help\' for available commands.');
              break;
          }
        }

        // Keyboard interaction
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') {
            processCommand(input.value);
            input.value = '';
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (history.length > 0 && historyIndex > 0) {
              historyIndex--;
              input.value = history[historyIndex];
            }
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex < history.length - 1) {
              historyIndex++;
              input.value = history[historyIndex];
            } else {
              historyIndex = history.length;
              input.value = '';
            }
          }
        });

        // Click anywhere on the terminal to focus the input
        container.addEventListener('click', function() {
          input.focus();
        });

        // Auto-focus after window animation completes
        setTimeout(function() { input.focus(); }, 200);

        return container;
      }

      var appConfigs = {
        'terminal':   { title: '终端',       content: createTerminalContent },
        'finder':     { title: '访达',       content: '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:15px;">访达 — 文件浏览器（即将实现）</div>' },
        'text-editor': { title: '文本编辑器',   content: '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:15px;">文本编辑器 — 文本编辑区域（即将实现）</div>' },
        'calculator': { title: '计算器',      content: '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:15px;">计算器 — 计算器界面（即将实现）</div>' },
        'airplane':   { title: '飞机大战',    content: '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:15px;">飞机大战 — 3D 飞机大战游戏（即将实现）</div>' }
      };

      dockItems.forEach(function(item) {
        item.addEventListener('click', function() {
          var app = item.getAttribute('data-app');
          var config = appConfigs[app];
          if (config && window.createWindow) {
            var content = config.content;
            if (typeof content === 'function') {
              content = content();
            }
            window.createWindow(config.title, content);
          }
        });
      });
    })();
  </script>
</body>

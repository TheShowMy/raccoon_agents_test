<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f7fa; padding: 20px; color: #333; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { text-align: center; margin-bottom: 20px; font-size: 2rem; color: #2c3e50; }
.filter-bar { display: flex; justify-content: center; margin-bottom: 30px; }
#searchInput { width: 100%; max-width: 400px; padding: 12px 16px; border: 2px solid #bdc3c7; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s; }
#searchInput:focus { outline: none; border-color: #3498db; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
.card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; transition: box-shadow 0.3s; }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.card-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f8f9fa; border-bottom: 1px solid #eee; }
.language-name { font-weight: 600; font-size: 1.1rem; }
.copy-btn { background: #3498db; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; }
.copy-btn:hover { background: #2980b9; }
.copy-btn.copied { background: #27ae60; }
.card-body { padding: 0; }
pre { margin: 0; padding: 16px; overflow-x: auto; font-size: 0.9rem; line-height: 1.5; background: #f6f8fa; }
code { font-family: 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
.hljs { background: transparent !important; }
</style>
</head>
<body>

    <input type="text" id="searchInput" placeholder="搜索语言名称...">
  </div>
  <div class="card-grid" id="cardGrid"></div>
</div>

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function copyCode(btn) {
  const code = btn.getAttribute('data-code');
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制代码';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const textarea = document.createElement('textarea');
    textarea.value = code;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制代码';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Search input handler

  renderCards(this.value);

// Initial render
document.addEventListener('DOMContentLoaded', () => {

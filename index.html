<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="macOS Sonoma/Sequoia 风格网页桌面模拟器" />
  <title>macOS Web Simulator</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/window.css" />
</head>
<body>

  <!-- ======== 桌面壁纸层 ======== -->
  <div id="desktop" class="desktop">
    <!-- 动态壁纸将通过 JS 注入 -->
  </div>

  <!-- ======== 顶部状态菜单栏 ======== -->
  <header id="menubar" class="menubar">
    <div class="menubar-left">
      <button class="menubar-apple" id="apple-menu-btn" title="Apple 菜单">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
          <path d="M12.5 8.4c-.1 1.6 1.2 2.8 1.3 2.9-.1.2-.9 3.2-3.1 3.2-.8 0-1.4-.5-2.2-.5-.8 0-1.6.5-2.2.5-2.1 0-3.5-3-3.5-3s-.4-1.2-.4-2.5c0-2.1 1.2-3.6 2.4-3.6.7 0 1.4.5 1.9.5.5 0 1.6-.6 2.4-.6.4 0 1.7.2 2.5 1.3-.1 0-1.5.9-1.5 2.6zM9.6 3.3c.4-.5.7-1.3.6-2-.6 0-1.3.4-1.8.9-.4.5-.8 1.2-.7 2 .6.1 1.3-.3 1.9-.9z"/>
        </svg>
      </button>
      <span class="menubar-app-name" id="menubar-app-name">Finder</span>
      <nav class="menubar-menus" id="menubar-menus">
        <!-- 菜单项由 JS 动态填充 -->
      </nav>
    </div>
    <div class="menubar-right">
      <span class="menubar-item" id="menubar-time" title="日期与时间">
        <!-- 时间由 JS 动态更新 -->
      </span>
    </div>
  </header>

  <!-- ======== 窗口容器 ======== -->
  <div id="window-layer" class="window-layer">
    <!-- 应用窗口由 JS 动态创建 -->
  </div>

  <!-- ======== 底部 Dock ======== -->
  <footer id="dock" class="dock">
    <div class="dock-inner" id="dock-inner">
      <!-- Dock 图标由 JS 动态填充 -->
    </div>
  </footer>

  <!-- ======== 菜单下拉浮层 ======== -->
  <div id="context-menu" class="context-menu hidden"></div>

  <script src="js/main.js"></script>
  <script src="js/window.js"></script>
</body>
</html>
